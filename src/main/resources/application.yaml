server:
  port: 8080
  servlet:
    context-path: /api

spring:
  task:
    scheduling:
      pool:
        size: 4
  mail:
    host: smtp.timeweb.ru
    port: 587
    username: support@wb-solution.ru
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?currentSchema=solution
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Время жизни соединения (держим ниже сетевых idle-таймаутов).
      max-lifetime: 300000  # 5 минут
      # Ожидание свободного соединения из пула.
      connection-timeout: 30000  # 30 секунд
      # Закрытие неиспользуемого соединения (ниже max-lifetime).
      idle-timeout: 240000  # 4 минуты
      # Минимум соединений в пуле.
      minimum-idle: 5
      # Максимум соединений в пуле.
      maximum-pool-size: 20
      # Простой health-check соединения.
      connection-test-query: SELECT 1
      # Таймаут валидации.
      validation-timeout: 5000  # 5 секунд
      # Детектор утечек (0 = выключено).
      leak-detection-threshold: 0

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${show_sql:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: solution

  web:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://wb-solution.ru,http://wb-solution.ru,http://109.68.213.220,http://109.68.213.220:80}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits}
  expiration: ${JWT_EXPIRATION:1209600000}

wb:
  # --- WB endpoints ---
  api:
    base-url: https://statistics-api.wildberries.ru
    content-base-url: https://content-api.wildberries.ru
    analytics-base-url: https://seller-analytics-api.wildberries.ru
    promotion-base-url: https://advert-api.wildberries.ru
    discounts-prices-base-url: https://discounts-prices-api.wildberries.ru
    dp-calendar-base-url: https://dp-calendar-api.wildberries.ru
    marketplace-base-url: https://marketplace-api.wildberries.ru
    supplies-base-url: https://supplies-api.wildberries.ru
    feedbacks-base-url: https://feedbacks-api.wildberries.ru
    timeout: 30000

  # --- Global WB rate limiter ---
  rate-limit:
    default-min-interval-ms: 0
    analytics-min-interval-ms: 200
    promotion-min-interval-ms: 200
    content-min-interval-ms: 700
    prices-min-interval-ms: 600
    feedbacks-min-interval-ms: 350
    statistics-min-interval-ms: 200

  # --- WB sync delays / retries ---
  content:
    cards-pagination-delay-ms: 700
  prices:
    api-call-delay-ms: 600
  analytics:
    card-delay-ms: 20000
    max-retries-429: 5
    retry-delay-ms-429: 20000
  stocks:
    request-delay-ms: 20000
    max-retries-429: 5
    retry-delay-ms-429: 20000
  promotion:
    campaigns-batch-size: 50
    statistics-batch-size: 50
    adverts-delay-ms: 200
    statistics-delay-ms: 20000
    max-retries-429: 5
    retry-delay-ms-429: 20000
  feedbacks:
    request-delay-ms: 350
  calendar:
    request-delay-ms: 1000
  warehouses:
    request-delay-ms: 1000

app:
  frontend-url: "https://wb-solution.ru"
  mail:
    from: support@wb-solution.ru
  # --- Full update executors tuning ---
  executors:
    core-pool-size: 4
    max-pool-size: 6
    task-queue-capacity: 500
    cabinet-queue-capacity: 100
    user-deletion-queue-capacity: 50
  wb-events:
    poll-delay-ms: ${wb_events_poll_delay_ms:3000}
    stuck-check-delay-ms: 15000
    running-timeout-minutes: 15
    event-await-timeout-seconds: 120
    default-batch-size: 50
    batch-size-by-type:
      CONTENT_CARDS_LIST_PAGE: 20
      ANALYTICS_SALES_FUNNEL_NMID: 30
      PRICES_CABINET_WITH_SPP: 8
      PROMOTION_COUNT: 12
      PROMOTION_ADVERTS_BATCH: 15
      PROMOTION_STATS_BATCH: 10
      FEEDBACKS_SYNC_CABINET: 15
      PROMOTION_CALENDAR_SYNC_CABINET: 15
      WAREHOUSES_SYNC_CABINET: 12
      STOCKS_BY_NMID: 20
  uploads:
    directory: /app/uploads
    max-file-size: 31457280  # 30 MB по умолчанию

subscription:
  billing-enabled: false  # true — тарифы и Робокасса; false — бесплатный доступ для селлеров
  trial-days: 14

robokassa:
  merchant-login: "wb-solution.ru"
  password1: ${ROBOKASSA_PASSWORD1:}
  password2: ${ROBOKASSA_PASSWORD2:}
  test: ${ROBOKASSA_TEST:true}
  # Два разных адреса на фронте — без query-параметров, Робокасса принимает
  success-url: "https://wb-solution.ru/subscription/success"
  fail-url: "https://wb-solution.ru/subscription/fail"
  result-url: "https://wb-solution.ru/api/subscription/payment/result"

logging:
  # --- Levels ---
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    ru.oparin.solution: ${LOGGING_LEVEL_APP:DEBUG}
    ru.oparin.solution.security: DEBUG
    ru.oparin.solution.service: DEBUG
    org.springframework.web: INFO
    org.springframework.security.web.FilterChainProxy: INFO
    org.springframework.security.web.authentication.AnonymousAuthenticationFilter: INFO
    org.springframework.security.web.access.Http403ForbiddenEntryPoint: WARN
    org.springframework.security.web.firewall: WARN
    org.apache.coyote.http11.Http11Processor: ERROR
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
  # --- Output file ---
  file:
    name: /app/logs/application.log
  # --- Message patterns ---
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %X{cabinetTag} %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %X{cabinetTag} %-5level %logger{36} - %msg%n"
  # --- Rotation ---
  logback:
    rollingpolicy:
      max-history: 30
      total-size-cap: 30MB
      max-file-size: 7MB

