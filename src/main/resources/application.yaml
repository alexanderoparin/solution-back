server:
  port: 8080
  servlet:
    context-path: /api

spring:
  task:
    scheduling:
      pool:
        size: 4
  mail:
    host: smtp.timeweb.ru
    port: 587
    username: corp@click-i.ru
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?currentSchema=solution
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Время жизни соединения (держим ниже сетевых idle-таймаутов).
      max-lifetime: 300000  # 5 минут
      # Ожидание свободного соединения из пула.
      connection-timeout: 30000  # 30 секунд
      # Закрытие неиспользуемого соединения (ниже max-lifetime).
      idle-timeout: 240000  # 4 минуты
      # Минимум соединений в пуле.
      minimum-idle: 5
      # Максимум соединений в пуле.
      maximum-pool-size: 20
      # Простой health-check соединения.
      connection-test-query: SELECT 1
      # Таймаут валидации.
      validation-timeout: 5000  # 5 секунд
      # Детектор утечек (0 = выключено).
      leak-detection-threshold: 0

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${show_sql:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: solution

  web:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://click-i.ru,https://www.click-i.ru,http://click-i.ru,https://wb-solution.ru,http://wb-solution.ru,http://109.68.213.220,http://109.68.213.220:80}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits}
  expiration: ${JWT_EXPIRATION:1209600000}

wb:
  http:
    connect-timeout-ms: 15000
    read-timeout-ms: 45000
  retries:
    max-429-basic: 5
    max-429-personal: 5
  promotion:
    campaigns-batch-size-basic: 50
    campaigns-batch-size-personal: 50
    statistics-batch-size-basic: 50
    statistics-batch-size-personal: 50
    normquery-items-batch-size: 100
    normquery-campaigns-batch-size-basic: 1
    normquery-campaigns-batch-size-personal: 20

app:
  frontend-url: "https://click-i.ru"
  brand-name: "Click-I"
  mail:
    from: corp@click-i.ru
  executors:
    core-pool-size: 4
    max-pool-size: 6
    task-queue-capacity: 500
    cabinet-queue-capacity: 100
    user-deletion-queue-capacity: 50
  wb-events:
    poll-delay-ms: ${wb_events_poll_delay_ms:5500}
    stuck-check-delay-ms: 16000
    running-timeout-minutes: 15
    event-await-timeout-seconds: 60
  uploads:
    directory: /app/uploads
    max-file-size: 31457280  # 30 MB по умолчанию
    cleanup-enabled: true
    orphan-min-age-hours: 1  # не трогать свежезагруженные файлы (окно между copy и save в БД)

subscription:
  billing-enabled: false  # true — глобальная оплата сайта; false — сайт бесплатен
  campaign-management-enabled: true  # подписка на раздел «Управление РК»
  trial-days: 14

tochka:
  enabled: ${TOCHKA_ENABLED:false}
  sandbox: ${TOCHKA_SANDBOX:false}
  jwt-token: ${TOCHKA_JWT_TOKEN:}
  client-id: ${TOCHKA_CLIENT_ID:}
  redirect-success-url: ${app.frontend-url}/subscription/success
  redirect-fail-url: ${app.frontend-url}/subscription/fail
  webhook-path: /webhooks/tochka

logging:
  # --- Levels ---
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    ru.oparin.solution: ${LOGGING_LEVEL_APP:DEBUG}
    ru.oparin.solution.security: DEBUG
    ru.oparin.solution.service: DEBUG
    org.springframework.web: INFO
    org.springframework.security.web.FilterChainProxy: INFO
    org.springframework.security.web.authentication.AnonymousAuthenticationFilter: INFO
    org.springframework.security.web.access.Http403ForbiddenEntryPoint: WARN
    org.springframework.security.web.firewall: WARN
    org.apache.coyote.http11.Http11Processor: ERROR
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
  # --- Output file ---
  file:
    name: /app/logs/application.log
  # --- Message patterns ---
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %X{cabinetTag} %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %X{cabinetTag} %-5level %logger{36} - %msg%n"
  # --- Rotation ---
  logback:
    rollingpolicy:
      max-history: 30
      total-size-cap: 30MB
      max-file-size: 7MB

